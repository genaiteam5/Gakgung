<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Korean Archery Simulator — MediaPipe Hands + Three.js</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:     #F8F8F8;
    --text:   #191919;
    --accent: #A52020;
    --muted:  rgba(25, 25, 25, 0.55);
    --line:   rgba(25, 25, 25, 0.18);
    --surface: rgba(248, 248, 248, 0.92);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: 'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text);
    letter-spacing: -0.06em;
    line-height: 1.3;
    font-feature-settings: "tnum" 1;
  }

  /* Three.js canvas — horizontally flipped (mirror mode) */
  #three { position: fixed; inset: 0; transform: scaleX(-1); }

  /* Webcam debug canvas (bottom-right PIP) — only visible during simulation */
  #webcam {
    position: fixed; right: 24px; bottom: 24px;
    width: 200px; height: 150px;
    border: 1px solid var(--line);
    background: #000; z-index: 20;
    display: none;
  }
  #webcamLabel {
    position: fixed; right: 28px; bottom: 180px; z-index: 21;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0;
    display: none;
  }
  body.sim #webcam, body.sim #webcamLabel { display: block; }

  /* ───────── Minimal in-simulation HUD ─────────
     Hidden during the hero/landing screen. Surfaces only when the
     simulation is actually running. Replaces the prior dense panel
     with a couple of tabular-numeric chips. */
  #ui {
    position: fixed; top: 22px; left: 36px; right: 36px; z-index: 20;
    display: none;
    justify-content: space-between; align-items: flex-start;
    pointer-events: none;
    letter-spacing: -0.04em;
  }
  body.sim #ui { display: flex; }
  .hudGroup {
    display: flex; flex-direction: column; gap: 4px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase;
  }
  .hudGroup.right { align-items: flex-end; }
  .hudVal {
    font-size: 14px; color: var(--text);
    font-variant-numeric: tabular-nums; letter-spacing: -0.06em;
  }
  .hudDrawWrap {
    width: 140px; height: 2px; background: var(--line);
    margin-top: 4px;
  }
  .hudDrawWrap > span {
    display: block; height: 100%; background: var(--text);
    width: 0%; transition: width .08s linear;
  }
  .hudGesture {
    font-size: 11px; color: var(--text);
    text-transform: uppercase; letter-spacing: 0;
  }
  .hudGesture.idle { color: var(--muted); }
  .hudGesture.fire { color: var(--accent); }

  /* ───────── Top navigation (matches the seewi homepage reference) ───────── */
  #topNav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 55;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 22px 36px;
    font-size: 12px; letter-spacing: -0.04em;
    pointer-events: none;
  }
  #topNav > div { display: flex; align-items: center; gap: 28px; pointer-events: auto; }
  #topNav .navRight { justify-content: flex-end; }
  #topNav .navCenter { justify-content: center; }
  .navItem, .navWordmark, #navBegin {
    color: var(--muted); cursor: pointer;
    text-decoration: none; font-family: inherit;
    background: none; border: none; padding: 0;
    font-size: 12px; letter-spacing: -0.04em;
  }
  .navItem.active { color: var(--text); }
  .navItem:hover, #navBegin:hover { color: var(--text); }
  .navWordmark {
    color: var(--text); font-weight: 700; letter-spacing: 0.04em;
  }
  #navBegin { color: var(--text); }

  /* ───────── Start screen — hero view + mode panel ───────── */
  #startScreen {
    position: fixed; inset: 0; z-index: 50;
    background: transparent;
    display: block; padding: 0;
  }
  /* The hero view is the default landing layout */
  #heroView {
    width: 100%; height: 100%;
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 110px 80px 80px 80px;
  }
  #startScreen.modes #heroView { display: none; }
  .heroLeft {
    display: flex; flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    padding-top: 40px;
  }
  .heroLeft h1.logo { margin: 0; line-height: 0; }
  .heroLeft h1.logo img {
    width: 360px; max-width: 38vw; height: auto;
    display: block;
  }
  .heroSlogan {
    font-size: clamp(28px, 3.8vw, 56px);
    line-height: 1.15;
    letter-spacing: -0.08em;
    color: var(--text);
    margin-top: 32px;
  }
  .heroCopy {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0;
  }
  .heroRight { position: relative; }
  /* Decorative ring behind the 3D bow */
  .heroCircle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(360px, 38vw, 620px);
    height: clamp(360px, 38vw, 620px);
    border: 1px solid var(--line);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Mode selection — only visible after "Begin →" is clicked */
  #modeView {
    width: 100%; height: 100%;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 120px 80px 80px 80px;
    gap: 14px; text-align: left;
  }
  #startScreen.modes #modeView { display: flex; }
  .modeViewTitle {
    font-size: 13px; color: var(--text); font-weight: 700;
    text-transform: uppercase; letter-spacing: 0; align-self: flex-start;
    max-width: 720px; margin: 0 auto; width: 100%;
  }
  .modeViewHint {
    font-size: 13px; color: var(--muted);
    max-width: 720px; margin: 0 auto 18px auto; width: 100%;
  }
  .modeBackBtn {
    margin-top: 8px;
    font-family: inherit; font-size: 11px; color: var(--muted);
    background: transparent; border: none; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0;
    align-self: flex-start;
    max-width: 720px; width: 100%; margin: 8px auto 0 auto;
  }
  .modeBackBtn:hover { color: var(--text); }
  .guide {
    max-width: 640px; text-align: left; font-size: 13px; line-height: 1.5;
    color: var(--text); margin-bottom: 26px;
  }
  .guide b.sut { color: var(--accent); }
  .guide b.am  { color: var(--text); }
  #errorBox {
    position: fixed; bottom: 24px; left: 36px;
    color: var(--accent);
    font-size: 11px; max-width: 560px; line-height: 1.5;
    z-index: 60;
  }
  #status {
    position: fixed; left: 36px; bottom: 24px; z-index: 20;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; opacity: 0;
  }
  body.sim #status { opacity: 1; }
  /* HIT / MISS center flash */
  #hitFlash {
    position: fixed; top: 38%; left: 50%; transform: translate(-50%,-50%);
    z-index: 20; font-size: 72px; font-weight: 700; color: var(--text);
    letter-spacing: -0.1em;
    opacity: 0; pointer-events: none;
  }
  #hitFlash.miss { color: var(--muted); }
  #hitFlash.hit  { color: var(--accent); }

  /* === Breath training — home menu tiles === */
  #startScreen h2 {
    font-size: 13px; color: var(--accent); margin-bottom: 8px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0;
  }
  #startScreen .subtitle {
    font-size: 13px; color: var(--muted); margin-bottom: 32px;
    line-height: 1.5; max-width: 720px;
  }
  .modeTiles {
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; max-width: 720px; margin-bottom: 22px;
  }
  .modeTile {
    background: var(--bg);
    border: 1px solid var(--text);
    padding: 20px 24px; cursor: pointer;
    color: var(--text); font-family: inherit; text-align: left;
    transition: background .15s, color .15s;
    display: grid;
    grid-template-columns: 56px 140px 1fr;
    align-items: center;
    column-gap: 24px;
    letter-spacing: -0.06em;
  }
  .modeTile:hover { background: var(--text); color: var(--bg); }
  .modeTile:hover .tSub { color: var(--bg); }
  .modeTile:hover .tDesc { color: rgba(248, 248, 248, 0.65); }
  .modeTile:hover .tShape * { stroke: var(--bg) !important; }
  .modeTile .tShape {
    width: 44px; height: 44px;
    grid-row: span 2;
  }
  .modeTile .tSub   {
    font-size: 10px; color: var(--accent);
    letter-spacing: 0; font-weight: 700; text-transform: uppercase;
    align-self: end;
  }
  .modeTile .tName  {
    font-size: 22px; font-weight: 700; color: inherit;
    letter-spacing: -0.06em;
    grid-column: 2;
    align-self: start;
  }
  .modeTile .tDesc  {
    font-size: 12px; color: var(--muted);
    line-height: 1.5;
    grid-column: 3;
    grid-row: 1 / span 2;
    align-self: center;
  }

  /* === Breath training — minimal HUD (shape ring + timer) === */
  #medHud {
    position: fixed; top: 80px; right: 36px; z-index: 21;
    width: 140px; padding: 0;
    background: transparent; border: none;
    display: none; flex-direction: column; align-items: center;
  }
  #medHud.show { display: flex; }
  #medMode {
    font-size: 9px; font-weight: 700; color: var(--muted);
    letter-spacing: 0; margin-bottom: 8px; text-align: center;
    text-transform: uppercase;
  }
  #medCanvasWrap { position: relative; width: 110px; height: 110px; }
  #medCanvas { width: 110px; height: 110px; display: block; }
  #medTimer {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: var(--text);
    letter-spacing: -0.08em;
    pointer-events: none; font-variant-numeric: tabular-nums;
  }
  #medLabel {
    margin-top: 6px; font-size: 10px; color: var(--muted);
    letter-spacing: 0; font-weight: 700;
    text-transform: uppercase;
  }
  /* One cycle complete — emphasize the FIRE signal */
  @keyframes readyPulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }
  #medTimer.ready {
    color: var(--accent); font-size: 22px;
    animation: readyPulse 1s ease-in-out infinite;
  }
  #medLabel.ready { color: var(--accent); }
</style>
</head>
<body>

<!-- 3D scene (mirror-flipped) -->
<canvas id="three"></canvas>

<!-- Webcam + skeleton debug overlay (sim only) -->
<div id="webcamLabel">Webcam debug</div>
<canvas id="webcam" width="320" height="240"></canvas>

<!-- Hidden video element for MediaPipe input -->
<video class="input_video" playsinline muted></video>

<!-- Top navigation (matches seewi homepage) -->
<nav id="topNav">
  <div class="navGroup navLeft">
    <button class="navItem active" data-nav="home">Home</button>
    <button class="navItem" data-nav="product">Product</button>
    <button class="navItem" data-nav="simulation">Simulation</button>
  </div>
  <div class="navGroup navCenter">
    <span class="navWordmark">SEEWI</span>
  </div>
  <div class="navGroup navRight">
    <button id="navBegin">Begin →</button>
  </div>
</nav>

<!-- Minimal in-sim HUD: hits/shots top-left, gesture + draw bar top-right -->
<div id="ui">
  <div class="hudGroup">
    <span>Hits / Shots</span>
    <span id="hudCount" class="hudVal">0 / 0</span>
  </div>
  <div class="hudGroup right">
    <span id="hudGesture" class="hudGesture idle">Idle</span>
    <div class="hudDrawWrap"><span id="hudDraw"></span></div>
  </div>
</div>

<div id="status">Initializing…</div>
<div id="hitFlash"></div>

<!-- Breath training mini HUD: Three.js shape + remaining time + phase label -->
<div id="medHud">
  <div id="medMode">BREATH MODE</div>
  <div id="medCanvasWrap">
    <canvas id="medCanvas" width="140" height="140"></canvas>
    <div id="medTimer">0s</div>
  </div>
  <div id="medLabel">Idle</div>
</div>

<!-- Home screen — hero on landing, breath-mode tiles after "Begin →". -->
<div id="startScreen" class="hero">
  <!-- Hero view — full-bleed landing matching the seewi homepage -->
  <div id="heroView">
    <div class="heroLeft">
      <h1 class="logo"><img src="images/seewi%20logo.png" alt="seewi" /></h1>
      <p class="heroSlogan">Aim inward,<br />find your stillness.</p>
      <p class="heroCopy">© 2026 SEEWI ALL RIGHTS RESERVED</p>
    </div>
    <div class="heroRight">
      <div class="heroCircle"></div>
    </div>
  </div>

  <!-- Breath-mode selection — only after Begin is clicked -->
  <div id="modeView">
    <div class="modeViewTitle">Select Breathing Mode</div>
    <p class="modeViewHint">Choose a rhythm. Once tracking starts, draw the bow to enter the cycle — the FIRE signal appears at the end of one cycle.</p>
    <div class="modeTiles">
      <button class="modeTile" data-mode="box">
        <svg class="tShape" viewBox="0 0 50 50" aria-hidden="true">
          <rect x="4" y="4" width="42" height="42" rx="4" fill="none" stroke="#191919" stroke-width="4"/>
        </svg>
        <div class="tSub">BALANCE · 4 · 4 · 4 · 4</div>
        <div class="tName">Box Breath</div>
        <div class="tDesc">4s inhale → 4s hold → 4s exhale → 4s hold. A balanced rhythm that settles tremor before the release.</div>
      </button>
      <button class="modeTile" data-mode="natural">
        <svg class="tShape" viewBox="0 0 50 50" aria-hidden="true">
          <circle cx="25" cy="25" r="21" fill="none" stroke="#191919" stroke-width="4"/>
        </svg>
        <div class="tSub">FOCUS · 2 · 2 · 3</div>
        <div class="tName">Natural Pause</div>
        <div class="tDesc">Short inhale → half exhale → 2–3s hold. The pause is the moment of sharpest focus — a practical archery rhythm.</div>
      </button>
      <button class="modeTile" data-mode="478">
        <svg class="tShape" viewBox="0 0 50 50" aria-hidden="true">
          <polygon points="25,5 45,42 5,42" fill="none" stroke="#191919" stroke-width="4" stroke-linejoin="round"/>
        </svg>
        <div class="tSub">CALM · 4 · 7 · 8</div>
        <div class="tName">4-7-8 Breath</div>
        <div class="tDesc">4s inhale → 7s hold → 8s long exhale. Deep relaxation that fully calms residual sway.</div>
      </button>
    </div>
    <button id="modeBack" class="modeBackBtn">← Back</button>
  </div>

  <div id="errorBox"></div>
</div>

<!-- ===== CDN: Three.js + GLTFLoader + MediaPipe Hands =====
     Pinned to three@0.147.0 — the last release that still ships the
     non-module `examples/js/` loaders. Newer versions (r148+) require
     ES-module/import-map setup, which this single-file build avoids. -->
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1675466124/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>

<script>
"use strict";

/* =========================================================================
   Config (tuning points)
   ========================================================================= */
const CONFIG = {
  GRAVITY: 0.022,            // virtual gravitational acceleration g (per frame)
  // SUT (full-grip release): fast, flat, linear trajectory
  SUT_SPEED: 2.4, SUT_SPEED_GAIN: 1.7,   // forward speed (very strong)
  SUT_VY: 0.35,   SUT_VY_GAIN: 0.20,     // initial lift (low drop)
  SUT_COOLDOWN: 1500,                    // reload cooldown 1.5s
  // AM (thumb-flick release): slow but soars high, large arc
  AM_SPEED: 0.9,  AM_SPEED_GAIN: 0.6,    // forward speed (about half of SUT)
  AM_VY: 0.95,    AM_VY_GAIN: 0.45,      // initial lift (big drop along the curve)
  AM_COOLDOWN: 700,                      // reload cooldown 0.7s (faster than SUT, not rapid-fire)
  DRAW_MIN: 0.12, DRAW_MAX: 0.62,        // normalization range for draw distance
  MAX_TRAIL: 48,                         // max number of trail line points
  MAX_ARROWS: 14,                        // max concurrent arrows
};

/* Moving target settings — single rectangular Korean 과녁 (HIT/MISS only) */
const TARGET = {
  baseX: 0, y: 7, z: -100,                       // base position (far away)
  moveAmpX: 7, moveAmpY: 1.6, moveSpeed: 0.0006, // horizontal/vertical amplitude · speed
  halfW: 3.6,                                    // hit-zone half-width  (HIT inside, MISS outside)
  halfH: 4.5,                                    // hit-zone half-height
};

/* =========================================================================
   Breath Meditation module
   ─ 3 modes: Box (4-4-4-4) / Natural Pause (2-2-3) / 4-7-8
   ─ Top-right mini HUD: a shape (square/circle/triangle) progress ring drawn with Three.js
   ─ Includes a smooth breath-depth curve function based on Math.sin
   ─ Hooks into the existing archery animate() loop with a single updateBreathing(now) call
   ========================================================================= */
const BREATH_MODES = {
  box: {
    name: "Box Breath",
    shape: "square",
    // 4-4-4-4: inhale (expand) → hold full → exhale (contract) → hold empty
    phases: [
      { label: "Inhale", type: "inhale",    dur: 4 },
      { label: "Hold",   type: "holdFull",  dur: 4 },
      { label: "Exhale", type: "exhale",    dur: 4 },
      { label: "Hold",   type: "holdEmpty", dur: 4 },
    ],
  },
  natural: {
    name: "Natural Pause",
    shape: "circle",
    // short inhale → half exhale → 2-3s hold (pause is the moment of focus)
    phases: [
      { label: "Inhale",      type: "inhale",    dur: 2 },
      { label: "Half exhale", type: "exhale",    dur: 2 },
      { label: "Hold",        type: "holdEmpty", dur: 3 },
    ],
  },
  "478": {
    name: "4-7-8 Breath",
    shape: "triangle",
    // 4s inhale → 7s hold → 8s long exhale (deep relaxation)
    phases: [
      { label: "Inhale",      type: "inhale",   dur: 4 },
      { label: "Hold",        type: "holdFull", dur: 7 },
      { label: "Long exhale", type: "exhale",   dur: 8 },
    ],
  },
};

let currentBreathMode = null;          // currently selected breath-mode object
let breathStartMs = 0;                  // breath cycle start time (performance.now)
let lastPhaseIndex = -1;                // for detecting phase transitions (chime trigger)
let vignetteAmount = 0;                 // vignette intensity (0–1, smoothly interpolated)
let medTimerEl, medLabelEl, medModeEl;  // HUD DOM references (bound lazily)

// ─── Three.js mini scene (dedicated to the breath HUD canvas) ───
let medRenderer, medScene, medCamera, medSegments = [];

/* Coordinates along the shape perimeter (u: 0–1, starts at 12 o'clock, clockwise)
   ─ shape: 'square' | 'circle' | 'triangle' */
function perimeterPoint(shape, u) {
  if (shape === "circle") {
    const a = -Math.PI / 2 + u * Math.PI * 2;
    const R = 0.86;
    return { x: Math.cos(a) * R, y: Math.sin(a) * R };
  }
  if (shape === "square") {
    const s = 0.78;           // half side length (centered at 0,0)
    const total = 8 * s;      // perimeter = 4 sides × 2s
    const d = u * total;
    if (d < s)   return { x: d,              y:  s };
    if (d < 3*s) return { x: s,              y:  s - (d - s) };
    if (d < 5*s) return { x: s - (d - 3*s),  y: -s };
    if (d < 7*s) return { x: -s,             y: -s + (d - 5*s) };
                 return { x: -s + (d - 7*s), y:  s };
  }
  if (shape === "triangle") {
    const R = 0.95;            // circumscribed-circle radius (vertices at 12/4/8 o'clock)
    const v = [
      { x: 0,                            y:  R },
      { x:  R * Math.sin( 2*Math.PI/3),  y:  R * Math.cos( 2*Math.PI/3) },
      { x:  R * Math.sin(-2*Math.PI/3),  y:  R * Math.cos(-2*Math.PI/3) },
    ];
    const sideLen = Math.hypot(v[1].x - v[0].x, v[1].y - v[0].y);
    const total = 3 * sideLen;
    const d = u * total;
    const i = Math.min(2, Math.floor(d / sideLen));
    const fr = (d - i * sideLen) / sideLen;
    const a = v[i], b = v[(i + 1) % 3];
    return { x: a.x + (b.x - a.x) * fr, y: a.y + (b.y - a.y) * fr };
  }
  return { x: 0, y: 0 };
}

/* Build a thick progress ring by splitting the shape perimeter into N short segment meshes */
function buildSegmentRing(shape, segCount) {
  const out = [];
  for (let i = 0; i < segCount; i++) {
    const u  = i / segCount;
    const p1 = perimeterPoint(shape, u);
    const p2 = perimeterPoint(shape, (i + 1) / segCount);
    const cx = (p1.x + p2.x) / 2;
    const cy = (p1.y + p2.y) / 2;
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const segLen = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    const mat = new THREE.MeshBasicMaterial({ color: 0xd6d6d6 });
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(segLen * 0.94, 0.16), mat);
    mesh.position.set(cx, cy, 0);
    mesh.rotation.z = ang;
    out.push({ mesh, mat, u });
  }
  return out;
}

/* Initialize the breath-HUD Three.js mini scene — called when a mode is selected */
function initMedHud(shape) {
  const canvas = document.getElementById("medCanvas");
  if (!medRenderer) {
    medRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    medRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    medRenderer.setSize(140, 140, false);
    medRenderer.setClearColor(0x000000, 0);
    medScene = new THREE.Scene();
    medCamera = new THREE.OrthographicCamera(-1.15, 1.15, 1.15, -1.15, 0.1, 10);
    medCamera.position.z = 5;
  } else {
    // On re-selecting a mode, dispose previous segments
    for (const s of medSegments) {
      s.mesh.geometry.dispose();
      s.mat.dispose();
      medScene.remove(s.mesh);
    }
  }
  const segCount = shape === "circle" ? 64 : shape === "square" ? 48 : 36;
  medSegments = buildSegmentRing(shape, segCount);
  for (const s of medSegments) medScene.add(s.mesh);
}

/* Compute the breath phase — pure function that accepts any phases array and returns current state.
   elapsedMs + phases → { phaseIndex, phase, remaining(sec left), progress(0–1 within phase), done }
   ※ Runs a single cycle (no repeat) — once complete, done:true signals "FIRE". */
function computeBreathPhase(elapsedMs, phases) {
  const totalSec = phases.reduce((s, p) => s + p.dur, 0);
  const tSec = elapsedMs / 1000;     // no modulo: runs once

  // One cycle complete → FIRE signal state
  if (tSec >= totalSec) {
    return { phaseIndex: phases.length, phase: null, remaining: 0, progress: 1, done: true };
  }

  let acc = 0;
  for (let i = 0; i < phases.length; i++) {
    const p = phases[i];
    if (tSec < acc + p.dur) {
      const inPhase = tSec - acc;
      return {
        phaseIndex: i, phase: p,
        remaining: p.dur - inPhase,
        progress: inPhase / p.dur,
        done: false,
      };
    }
    acc += p.dur;
  }
  const last = phases[phases.length - 1];
  return { phaseIndex: phases.length - 1, phase: last, remaining: 0, progress: 1, done: false };
}

/* Breath depth (0 = fully empty, 1 = fully full) — smooth curve via Math.sin/cos.
   Free to use externally (e.g., as a bow-tremor damping coefficient). */
function breathDepth(phaseType, progress) {
  switch (phaseType) {
    case "inhale":    return Math.sin(progress * Math.PI / 2);  // 0 → 1 (sine)
    case "exhale":    return Math.cos(progress * Math.PI / 2);  // 1 → 0 (cosine)
    case "holdFull":  return 1;
    case "holdEmpty": return 0;
    default:          return 0;
  }
}

/* ─── WebAudio: soft chime on phase transition (browser-native API) ─── */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
}
function chime(freq) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = "sine"; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.05, t0 + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + 0.7);
}

/* ─── Per-frame: refresh HUD/ring/timer/vignette together ───
   The breath HUD is shown only while AIMING + string is sufficiently drawn.
   After firing returns to IDLE it auto-hides; drawing again starts a fresh cycle. */
function updateBreathing(now) {
  if (!currentBreathMode) return;

  // Visibility condition — fist clenched (aiming) and string drawn past the threshold
  const shouldShow = (state === "AIMING") && (drawPowerSmooth >= MIN_DRAW_POWER);
  const medHudEl = document.getElementById("medHud");

  if (shouldShow && !breathHudShown) {
    // New display — restart the breath cycle from inhale
    breathHudShown = true;
    breathStartMs = now;
    lastPhaseIndex = -1;
    medHudEl.classList.add("show");
  } else if (!shouldShow && breathHudShown) {
    // Hide if no longer drawing (after firing, etc.)
    breathHudShown = false;
    medHudEl.classList.remove("show");
    // Clear the FIRE-signal emphasis class for the next cycle
    if (medTimerEl) medTimerEl.classList.remove("ready");
    if (medLabelEl) medLabelEl.classList.remove("ready");
  }

  // Vignette target — fades naturally to 0 when the HUD is hidden
  let vTarget = 0;

  if (breathHudShown) {
    const info = computeBreathPhase(now - breathStartMs, currentBreathMode.phases);

    // Phase-transition chime (once per phaseIndex change)
    if (info.phaseIndex !== lastPhaseIndex) {
      lastPhaseIndex = info.phaseIndex;
      if (info.done) {
        chime(880);   // FIRE signal chime — announces cycle completion
      } else {
        const f = { inhale: 660, exhale: 392, holdFull: 523, holdEmpty: 440 }[info.phase.type] || 440;
        chime(f);
      }
    }

    if (info.done) {
      // ─── One cycle complete → "FIRE!" signal ───
      const READY = 0xa52020;   // Accent
      for (const s of medSegments) s.mat.color.setHex(READY);
      if (medTimerEl) {
        medTimerEl.textContent = "FIRE";
        medTimerEl.classList.add("ready");
      }
      if (medLabelEl) {
        medLabelEl.textContent = "Release";
        medLabelEl.classList.add("ready");
      }
      vTarget = 0;             // release vignette — brighten view (aim finishing)
    } else {
      // ─── Breath in progress ───
      const FILL = 0xa52020, EMPTY = 0xd6d6d6;
      for (const s of medSegments) s.mat.color.setHex(s.u <= info.progress ? FILL : EMPTY);

      if (medTimerEl) {
        medTimerEl.textContent = Math.ceil(info.remaining) + "s";
        medTimerEl.classList.remove("ready");
      }
      if (medLabelEl) {
        medLabelEl.textContent = info.phase.label;
        medLabelEl.classList.remove("ready");
      }

      // Vignette target — edges darken during holds or long exhales (≥6s)
      if (info.phase.type === "holdFull" || info.phase.type === "holdEmpty") vTarget = 0.55;
      if (info.phase.type === "exhale" && info.phase.dur >= 6) vTarget = 0.7;
    }

    // Render the mini scene
    if (medRenderer) medRenderer.render(medScene, medCamera);
  }

  // Smooth interpolation for vignette intensity (natural fade on show/hide)
  vignetteAmount += (vTarget - vignetteAmount) * 0.04;
  if (vignetteUniform) vignetteUniform.value = vignetteAmount;
}

/* =========================================================================
   Post-processing: vignette (darken edges during breath holds & long exhales)
   ─ No camera shake. Camera stays fixed; only the screen edges gradually darken.
   ─ Main scene → WebGLRenderTarget → fullscreen quad (vignette shader) → screen
   ========================================================================= */
let renderTarget, postScene, postCamera, postMat, vignetteUniform;

function initPostProcessing() {
  const w = window.innerWidth, h = window.innerHeight;
  renderTarget = new THREE.WebGLRenderTarget(w, h, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat, samples: 4,        // multisample AA
  });
  postScene = new THREE.Scene();
  postCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
  vignetteUniform = { value: 0 };
  postMat = new THREE.ShaderMaterial({
    uniforms: { tDiffuse: { value: renderTarget.texture }, uVignette: vignetteUniform },
    vertexShader: [
      "varying vec2 vUv;",
      "void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }",
    ].join("\n"),
    fragmentShader: [
      "varying vec2 vUv;",
      "uniform sampler2D tDiffuse;",
      "uniform float uVignette;",
      "void main(){",
      "  vec4 c = texture2D(tDiffuse, vUv);",
      "  vec2 d = vUv - 0.5;",
      "  float r = length(d) * 1.414;",
      "  float v = smoothstep(0.35, 0.95, r) * uVignette;",
      "  c.rgb *= (1.0 - v);",
      "  gl_FragColor = c;",
      "}",
    ].join("\n"),
  });
  postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), postMat));
}

const MIN_DRAW_POWER = 0.18;             // min draw power required to allow firing (0–1)

let drawPower = 0;                       // 0–1 normalized draw power
let drawPowerSmooth = 0;
let rawDrawDist = 0;

// World coordinates updated every frame from MediaPipe results

// GLB model caches — kept as references so they can be re-cloned later if needed.

/* =========================================================================
   GLB asset loading — bow (활수정.glb) + gakji finger guard (깍지.glb).
   Both files live in /images and are URL-encoded because of Korean filenames.
   Auto-fit bounding box to a target world size and apply a sensible default
   orientation so the bow points its limbs up/down with the string toward
   the viewer (the user's first-person eye).
   ========================================================================= */
function autoFitModel(root, targetSize) {
  const box = new THREE.Box3().setFromObject(root);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const s = targetSize / maxDim;
  root.scale.multiplyScalar(s);
  // Re-center after scaling
  const box2 = new THREE.Box3().setFromObject(root);
  const center = box2.getCenter(new THREE.Vector3());
  root.position.sub(center);
}

function loadBowModel() {
  const loader = new THREE.GLTFLoader();
  loader.load(
    "images/%ED%99%9C%EC%88%98%EC%A0%95.glb",  // 활수정.glb (URL-encoded)
    (gltf) => {
      bowGltf = gltf;
      const m = gltf.scene;
      autoFitModel(m, 5.2);     // bow ~5 units tall to match arm-length scene scale
      m.rotation.y = Math.PI;   // face the camera (string side toward user)
      bowGroup.clear();
      bowGroup.add(m);
    },
    undefined,
    (err) => console.warn("Failed to load bow GLB", err)
  );
}

function loadGakjiModel() {
  const loader = new THREE.GLTFLoader();
  loader.load(
    "images/%EA%B9%8D%EC%A7%80.glb",            // 깍지.glb (URL-encoded)
    (gltf) => {
      gakjiGltf = gltf;
      const m = gltf.scene;
      autoFitModel(m, 0.9);     // small accessory — fits on a finger/thumb
      drawHandMarker.clear();
      drawHandMarker.add(m);
    },
    undefined,
    (err) => console.warn("Failed to load gakji GLB", err)
  );
}

/* Arrow mesh.
   Local axis convention: shaft along Z, HEAD on -Z (forward), FLETCH on +Z (back).
   After lookAt(target) on the parent group, local -Z aligns with the target
   direction — so the head (and the arrow's flight) point toward `target`.
   Group origin sits at the geometric center so projectile physics can use
   the group position as the arrow's tracked point. */
function makeArrow(color) {
  const g = new THREE.Group();
  const len = 4.0;
  const half = len / 2;

  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, len, 10),
    new THREE.MeshStandardMaterial({ color: 0x191919 })
  );
  shaft.rotation.x = Math.PI / 2;                       // shaft along Z

  // Arrowhead — clearly placed on -Z, slightly oversized so the forward
  // direction reads at a glance even up close in first-person view.
  const headLen = 0.6;
  const head = new THREE.Mesh(
    new THREE.ConeGeometry(0.18, headLen, 12),
    new THREE.MeshStandardMaterial({ color })
  );
  head.rotation.x = -Math.PI / 2;                       // tip on -Z
  head.position.z = -half - headLen / 2;                // sits forward of shaft

  // Crossed vanes for the fletch — looks like a real fletching from any angle
  // and avoids the "flat plate facing the camera" illusion that the old
  // single-box fletching produced in first-person.
  const vaneMat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
  const vaneGeo = new THREE.BoxGeometry(0.4, 0.02, 0.5);
  const v1 = new THREE.Mesh(vaneGeo, vaneMat);
  const v2 = new THREE.Mesh(vaneGeo, vaneMat);
  v2.rotation.z = Math.PI / 2;
  v1.position.z = half - 0.3;
  v2.position.z = half - 0.3;

  g.add(shaft, head, v1, v2);
  return g;
}

/* Distant target — simplified Korean 과녁 (single rectangular face, no rings).
   Visual: cream face panel with a dark border + slim central marker.
   Hit logic: any arrow crossing within (±halfW, ±halfH) is a HIT. */
function buildTarget() {
  targetGroup = new THREE.Group();

  const w = TARGET.halfW * 2;
  const h = TARGET.halfH * 2;

  // Face — light cream panel
  const face = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshStandardMaterial({ color: 0xf5f1ea, roughness: 0.95, side: THREE.DoubleSide })
  );
  face.position.z = 0;
  targetGroup.add(face);

  // Thin dark border made from four edge bars (no rings, no scoring zones)
  const borderMat = new THREE.MeshBasicMaterial({ color: 0x191919 });
  const t = 0.08;          // border thickness
  const top    = new THREE.Mesh(new THREE.PlaneGeometry(w + t * 2, t), borderMat);
  const bot    = new THREE.Mesh(new THREE.PlaneGeometry(w + t * 2, t), borderMat);
  const left   = new THREE.Mesh(new THREE.PlaneGeometry(t, h),         borderMat);
  const right  = new THREE.Mesh(new THREE.PlaneGeometry(t, h),         borderMat);
  top.position.set(0,  TARGET.halfH + t / 2, 0.01);
  bot.position.set(0, -TARGET.halfH - t / 2, 0.01);
  left.position.set(-TARGET.halfW - t / 2, 0, 0.01);
  right.position.set( TARGET.halfW + t / 2, 0, 0.01);
  targetGroup.add(top, bot, left, right);

  // Discreet center dot — visual focus point, not a scoring zone
  const dot = new THREE.Mesh(
    new THREE.CircleGeometry(0.18, 24),
    new THREE.MeshBasicMaterial({ color: 0x191919 })
  );
  dot.position.z = 0.02;
  targetGroup.add(dot);

  // Slim support post
  const post = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.18, 8, 10),
    new THREE.MeshStandardMaterial({ color: 0x191919, roughness: 1 })
  );
  post.position.set(0, -TARGET.halfH - 4, -0.3);
  targetGroup.add(post);

  targetGroup.position.set(TARGET.baseX, TARGET.y, TARGET.z);
  scene.add(targetGroup);
}

/* HIT / MISS only — returns 1 for hit (within the rectangular face), else 0.
   dx, dy = absolute offsets from the target center on the target plane. */
function judgeHit(dx, dy) {
  return (dx <= TARGET.halfW && dy <= TARGET.halfH) ? 1 : 0;
}

/* =========================================================================
   Coordinate mapping: MediaPipe normalized coords → Three.js world coords
   (3D canvas is mirrored via CSS scaleX(-1), so landmark.x is used as-is)
   ========================================================================= */
function landmarkToWorld(lm) {
  const wx = (lm.x - 0.5) * 14;            // horizontal spread
  const wy = (0.5 - lm.y) * 9 + 4;         // lift upward (landmark y increases downward)
  const wz = 3 + (lm.z || 0) * 6;          // depth
  return new THREE.Vector3(wx, wy, wz);
}

function dist3D(a, b) {
  const dz = (a.z || 0) - (b.z || 0);
  return Math.hypot(a.x - b.x, a.y - b.y, dz);
}

function handCenter(lms) {
  let x = 0, y = 0, z = 0;
  for (const l of lms) { x += l.x; y += l.y; z += l.z || 0; }
  return { x: x / lms.length, y: y / lms.length, z: z / lms.length };
}

/* =========================================================================
   Finger Folded / Extended classification
   Simple True/False test based on relative joint positions.
   - Index/Middle: if the Tip (8, 12) is closer to the wrist (0) than its own MCP (5, 9), it is folded
   - Thumb: if the Tip (4) sits closer (inward) to the pinky base (17) than the MCP (2), it is folded
   ========================================================================= */
function computeFingerStates(lms) {
  const w = lms[0];
  const d = (a, b) => dist3D(a, b);

  // Per-finger fold ratio (< 1 = folded side, > 1 = extended side).
  // A hysteresis deadband prevents jitter near the threshold from flipping the state.
  // → blocks the main cause of AM misfires (false fire from thumb jitter).

  // Index: tip(8)→wrist / MCP(5)→wrist ratio
  const rIdx = d(lms[8],  w) / Math.max(0.001, d(lms[5], w));
  if (rIdx < 0.90)      stableIndex = true;     // clearly folded
  else if (rIdx > 1.10) stableIndex = false;    // clearly extended
  // (in-between values keep the previous state)

  // Middle: tip(12)→wrist / MCP(9)→wrist ratio
  const rMid = d(lms[12], w) / Math.max(0.001, d(lms[9], w));
  if (rMid < 0.90)      stableMiddle = true;
  else if (rMid > 1.10) stableMiddle = false;

  // Thumb: tip(4)→pinky-MCP(17) / MCP(2)→pinky-MCP(17) ratio
  // Wider deadband (0.92–1.14) — thumb jitter is the worst
  const rThm = d(lms[4], lms[17]) / Math.max(0.001, d(lms[2], lms[17]));
  if (rThm < 0.92)      stableThumb = true;
  else if (rThm > 1.14) stableThumb = false;

  return { thumb: stableThumb, index: stableIndex, middle: stableMiddle };
}

/* =========================================================================
   Gesture state machine + fire branching
   ========================================================================= */
function updateStateMachine(f, now) {
  const cooldownLeft = Math.max(0, lastFireTime + currentCooldown - now);
  const onCooldown = cooldownLeft > 0;

  // Safeguards — all must hold to permit a real fire (prevents spam)
  const enoughDraw = drawPowerSmooth >= MIN_DRAW_POWER;   // string drawn enough?
  const heldLong   = (now - aimStartMs) >= MIN_AIM_MS;    // aim held long enough?
  const canFire    = !onCooldown && enoughDraw && heldLong;

  const isFist      = f.thumb && f.index && f.middle;             // tight fist
  const allExtended = !f.thumb && !f.index && !f.middle;          // hand fully opened
  const prevAllExt  = !prevFinger.thumb && !prevFinger.index && !prevFinger.middle;
  const thumbRising = !f.thumb && prevFinger.thumb;               // thumb: folded → extended (flick)
  const allExtRising = allExtended && !prevAllExt;                // moment all three fingers extend together

  if (state === "IDLE") {
    if (isFist) {
      state = "AIMING";
      aimStartMs = now;                          // record aim-start time
    }
  }

  if (state === "AIMING") {
    // ① SUT full-grip release: [the instant thumb + index + middle all extend simultaneously]
    if (allExtRising) {
      if (canFire) fireArrow("sut", now);
      state = "IDLE";
    }
    // ② AM thumb-flick release: [index/middle still folded, only the thumb flicks up]
    //   - hysteresis + min draw + min aim-hold block jitter-fires
    else if (thumbRising && f.index && f.middle) {
      if (canFire) fireArrow("am", now);
      state = "IDLE";
    }
  }
}

/* =========================================================================
   Fire arrow — velocity vector differs per release mode
   ========================================================================= */
function fireArrow(mode, now) {
  const p = drawPowerSmooth;                       // draw power 0–1
  const spawn = latestBowCenter ? latestBowCenter.clone() : new THREE.Vector3(0, 5, 3);

  // Slight lateral aim (reflects x-offset between the two hands)
  let velX = 0;
  if (latestBowCenter && latestDrawPoint) {
    velX = THREE.MathUtils.clamp((latestBowCenter.x - latestDrawPoint.x) * 0.04, -0.25, 0.25);
  }

  let velY, velZ, color;
  if (mode === "sut") {
    // SUT: very strong forward speed, low rise — flat, far-reaching, heavy linear shot
    velZ = -(CONFIG.SUT_SPEED + p * CONFIG.SUT_SPEED_GAIN);
    velY =  CONFIG.SUT_VY + p * CONFIG.SUT_VY_GAIN;
    color = 0xa52020;
    currentCooldown = CONFIG.SUT_COOLDOWN;
  } else {
    // AM: about half the forward speed, but soars high — large drop, arc-shaped trajectory
    velZ = -(CONFIG.AM_SPEED + p * CONFIG.AM_SPEED_GAIN);
    velY =  CONFIG.AM_VY + p * CONFIG.AM_VY_GAIN;
    color = 0x191919;
    currentCooldown = CONFIG.AM_COOLDOWN;
  }

  const group = makeArrow(color);
  group.position.copy(spawn);

  // Trail line: SUT = translucent accent / AM = translucent text-color
  const trailMesh = new THREE.Mesh(
    new THREE.BufferGeometry(),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5, depthWrite: false })
  );

  scene.add(group, trailMesh);
  arrows.push({ group, trailMesh, vel: { x: velX, y: velY, z: velZ }, mode, trailPoints: [], scored: false });
  shotCount++;

  // Cap concurrent arrows (remove the oldest first)
  while (arrows.length > CONFIG.MAX_ARROWS) killArrow(arrows[0]);

  lastFireTime = now;
  lastFireMode = mode;
}

function killArrow(a) {
  a.group.traverse((o) => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
  scene.remove(a.group);
  a.trailMesh.geometry.dispose();
  a.trailMesh.material.dispose();
  scene.remove(a.trailMesh);
  const i = arrows.indexOf(a);
  if (i >= 0) arrows.splice(i, 1);
}

/* =========================================================================
   Per-frame physics update (projectile motion)
   Required formula: y = y + velocityY - (0.5 * g)
   ========================================================================= */
function updateArrows(now) {
  const g = CONFIG.GRAVITY;
  const tx = targetGroup.position.x, ty = targetGroup.position.y, tz = targetGroup.position.z;
  for (let i = arrows.length - 1; i >= 0; i--) {
    const a = arrows[i];
    const pos = a.group.position;
    const prevZ = pos.z;

    // Projectile motion combining gravity + mode-specific velocity vector
    pos.x += a.vel.x;
    pos.z += a.vel.z;
    pos.y += a.vel.y - 0.5 * g;     // ← y = y + velocityY - (0.5 * g)
    a.vel.y -= g;                   // decrease vertical velocity (gravity) for next frame

    // Target-plane crossing test → HIT / MISS judgement
    if (!a.scored && prevZ > tz && pos.z <= tz) {
      const dx = Math.abs(pos.x - tx);
      const dy = Math.abs(pos.y - ty);
      if (judgeHit(dx, dy)) {
        score += 1; hitCount++;
        lastShotResult = "HIT";
        targetPulse = 1;
      } else {
        lastShotResult = "MISS";
      }
      lastHitTime = now;
      a.scored = true;
    }

    // Align arrow to its travel direction (arrow local -Z points forward)
    a.group.lookAt(pos.x + a.vel.x, pos.y + a.vel.y, pos.z + a.vel.z);

    // Update the trail line
    a.trailPoints.push(pos.clone());
    if (a.trailPoints.length > CONFIG.MAX_TRAIL) a.trailPoints.shift();
    if (a.trailPoints.length >= 2) {
      const curve = new THREE.CatmullRomCurve3(a.trailPoints);
      const newGeo = new THREE.TubeGeometry(
        curve, Math.min(a.trailPoints.length * 2, 90), 0.12, 6, false
      );
      a.trailMesh.geometry.dispose();
      a.trailMesh.geometry = newGeo;
    }

    // Remove if it leaves the visible area
    if (pos.y < -4 || pos.z < -210 || Math.abs(pos.x) > 130) killArrow(a);
  }
}

/* Moving target: wide horizontal sway, slight vertical drift; pulses on hit */
function updateTarget(now) {
  targetGroup.position.x = TARGET.baseX + Math.sin(now * TARGET.moveSpeed) * TARGET.moveAmpX;
  targetGroup.position.y = TARGET.y + Math.sin(now * TARGET.moveSpeed * 1.7) * TARGET.moveAmpY;
  targetPulse *= 0.9;
  targetGroup.scale.setScalar(1 + targetPulse * 0.16);
}

/* =========================================================================
   Visual refresh: bow / string / nocked arrow
   ========================================================================= */
function updateBowVisual() {
  // Hero state — present the bow as a still-life on the right of the canvas.
  // Slow Y rotation gives the homepage a subtle sense of life without
  // distracting from the typography on the left.
  if (appState === "hero") {
    bowGroup.position.lerp(HERO_BOW_POS, 0.08);
    bowGroup.rotation.y += 0.0035;
    bowHandMarker.visible = false;
    drawHandMarker.visible = false;
    nockedArrow.visible = false;
    return;
  }

  // Sim state — bow smoothly follows the left (bow) hand.
  // Decay any leftover hero-spin so the GLB's intrinsic forward orientation is restored.
  bowGroup.rotation.y *= 0.85;
  if (latestBowCenter) {
    bowGroup.position.lerp(latestBowCenter, 0.4);
    bowHandMarker.position.copy(latestBowCenter);
    bowHandMarker.visible = false;   // hidden in first-person; sphere would block the bow
  } else {
    bowHandMarker.visible = false;
  }

  drawHandMarker.visible = !!latestDrawPoint;
  if (latestDrawPoint) {
    drawHandMarker.position.copy(latestDrawPoint);
    // Gakji rides on the thumb — point it at the bow so it visually engages the string
    if (drawHandMarker.children.length > 0) drawHandMarker.lookAt(bowGroup.position);
  }

  // String draw point: right-hand position while aiming, otherwise the bow center
  let nock;
  if (state === "AIMING" && latestDrawPoint) {
    nock = latestDrawPoint.clone();
    // Pull the string further back in proportion to draw strength (hand-to-hand distance)
    nock.z = bowGroup.position.z + 0.6 + drawPowerSmooth * 4.2;
  } else {
    nock = bowGroup.position.clone();
    nock.z += 0.5;
  }
  smoothedNock.lerp(nock, 0.5);

  const top = bowGroup.position.clone().add(new THREE.Vector3(0,  2.4, 0));
  const bot = bowGroup.position.clone().add(new THREE.Vector3(0, -2.4, 0));
  bowString.geometry.setFromPoints([top, smoothedNock, bot]);

  // Show the nocked arrow while aiming
  nockedArrow.visible = state === "AIMING";
  if (nockedArrow.visible) {
    nockedArrow.position.copy(smoothedNock);
    nockedArrow.lookAt(bowGroup.position.x, bowGroup.position.y, bowGroup.position.z - 6);
  }
}

/* =========================================================================
   MediaPipe Hands result handling
   ========================================================================= */
const webcamCanvas = document.getElementById("webcam");
const webcamCtx = webcamCanvas.getContext("2d");

function onResults(results) {
  const W = webcamCanvas.width, H = webcamCanvas.height;

  // --- Webcam debug canvas: draw mirrored (flipped horizontally) ---
  webcamCtx.save();
  webcamCtx.clearRect(0, 0, W, H);
  webcamCtx.translate(W, 0);
  webcamCtx.scale(-1, 1);
  if (results.image) webcamCtx.drawImage(results.image, 0, 0, W, H);

  // --- Classify detected hands as left/right by their mean x coordinate ---
  // (in the un-mirrored source image: user's right hand = screen left = smaller x)
  let hands = [];
  if (results.multiHandLandmarks) {
    for (const lms of results.multiHandLandmarks) {
      hands.push({ lms, avgX: handCenter(lms).x });
    }
  }
  hands.sort((a, b) => a.avgX - b.avgX);

  let drawHand = null, bowHand = null;
  if (hands.length >= 2) {
    drawHand = hands[0];          // smaller x → user's right hand (draws the string)
    bowHand  = hands[hands.length - 1]; // larger x → user's left hand (holds the bow)
  } else if (hands.length === 1) {
    if (hands[0].avgX < 0.5) drawHand = hands[0];
    else bowHand = hands[0];
  }

  // --- Overlay the 21-joint hand skeleton ---
  if (bowHand) {
    drawConnectors(webcamCtx, bowHand.lms, HAND_CONNECTIONS, { color: "#F8F8F8", lineWidth: 2 });
    drawLandmarks(webcamCtx, bowHand.lms, { color: "#F8F8F8", lineWidth: 1, radius: 2 });
  }
  if (drawHand) {
    drawConnectors(webcamCtx, drawHand.lms, HAND_CONNECTIONS, { color: "#A52020", lineWidth: 2 });
    drawLandmarks(webcamCtx, drawHand.lms, { color: "#A52020", lineWidth: 1, radius: 2 });
  }
  webcamCtx.restore();

  // --- Hand data → world coords / draw distance / finger states ---
  handsPresent.bow = !!bowHand;
  handsPresent.draw = !!drawHand;

  latestBowCenter = bowHand ? landmarkToWorld(handCenter(bowHand.lms)) : null;
  latestDrawPoint = drawHand ? landmarkToWorld(drawHand.lms[2]) : null; // Landmark 2 = thumb base

  // Draw distance: 3D distance between left-hand center ↔ right-hand thumb-base joint (#2)
  if (bowHand && drawHand) {
    rawDrawDist = dist3D(handCenter(bowHand.lms), drawHand.lms[2]);
  } else {
    rawDrawDist = 0;
  }
  drawPower = THREE.MathUtils.clamp(
    (rawDrawDist - CONFIG.DRAW_MIN) / (CONFIG.DRAW_MAX - CONFIG.DRAW_MIN), 0, 1
  );

  const now = performance.now();
  if (drawHand) {
    curFinger = computeFingerStates(drawHand.lms);
    updateStateMachine(curFinger, now);
    prevFinger = curFinger;
  } else {
    // If the right hand is lost, drop out of aiming
    state = "IDLE";
  }
}

/* =========================================================================
   Minimal HUD refresh — hits/shots, gesture state, draw bar, HIT/MISS flash
   ========================================================================= */
const el = {
  count: document.getElementById("hudCount"),
  gesture: document.getElementById("hudGesture"),
  draw: document.getElementById("hudDraw"),
  hitFlash: document.getElementById("hitFlash"),
  status: document.getElementById("status"),
};

let lastShotResult = null;   // 'HIT' | 'MISS' for the most recent shot

function updateHUD(now) {
  // Draw-distance bar
  el.draw.style.width = (drawPowerSmooth * 100).toFixed(0) + "%";

  // Gesture state (compact)
  let label, cls;
  if (now - lastFireTime < 500 && lastFireMode) {
    label = lastFireMode === "sut" ? "SUT · FIRE" : "AM · FIRE";
    cls = "fire";
  } else if (state === "AIMING") {
    label = "Aiming"; cls = "";
  } else {
    label = handsPresent.draw ? "Idle" : "No right hand"; cls = "idle";
  }
  el.gesture.textContent = label;
  el.gesture.className = "hudGesture " + cls;

  // Hit / shot counter
  el.count.textContent = hitCount + " / " + shotCount;

  // Centered HIT / MISS flash
  const fa = now - lastHitTime;
  if (fa < 900 && lastShotResult) {
    const t = fa / 900;
    el.hitFlash.textContent = lastShotResult;
    el.hitFlash.className = lastShotResult === "HIT" ? "hit" : "miss";
    el.hitFlash.style.opacity = (1 - t).toFixed(2);
    el.hitFlash.style.transform = "translate(-50%,-50%) scale(" + (1 + t * 0.25).toFixed(2) + ")";
  } else {
    el.hitFlash.style.opacity = 0;
  }
}

/* =========================================================================
   Main render loop
   ========================================================================= */
const _camLookTarget = new THREE.Vector3();
const _camLookCur    = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();

  // Smooth draw-power
  drawPowerSmooth += (drawPower - drawPowerSmooth) * 0.3;

  // Smoothly ease the camera between hero pose and the first-person sim pose
  const tgtPos  = (appState === "sim") ? SIM_CAM_POS  : HERO_CAM_POS;
  const tgtLook = (appState === "sim") ? SIM_LOOK_AT  : HERO_LOOK_AT;
  camera.position.lerp(tgtPos, 0.06);
  _camLookTarget.copy(tgtLook);
  _camLookCur.lerp(_camLookTarget, 0.08);
  camera.lookAt(_camLookCur);

  updateArrows(now);
  updateTarget(now);
  updateBowVisual();
  updateHUD(now);
  updateBreathing(now);   // ← refresh breath HUD + vignette intensity (single integrated call)

  // Main scene → render target → vignette shader quad → screen (post-processing)
  if (renderTarget) {
    renderer.setRenderTarget(renderTarget);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    renderer.render(postScene, postCamera);
  } else {
    renderer.render(scene, camera);
  }
}

/* =========================================================================
   MediaPipe + webcam initialization
   ========================================================================= */
let hands, mpCamera;
const videoEl = document.querySelector(".input_video");

function initMediaPipe() {
  hands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`,
  });
  hands.setOptions({
    maxNumHands: 2,                // multi-hand (both hands)
    modelComplexity: 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6,
    selfieMode: false,             // we handle mirroring ourselves
  });
  hands.onResults(onResults);
}

async function startCamera() {
  const errBox = document.getElementById("errorBox");
  errBox.textContent = "";

  if (typeof THREE === "undefined") { errBox.textContent = "Failed to load Three.js CDN."; return; }
  if (typeof Hands === "undefined" || typeof Camera === "undefined") {
    errBox.textContent = "Failed to load MediaPipe CDN. Check your internet connection.";
    return;
  }

  try {
    el.status.textContent = "Loading MediaPipe model…";
    initMediaPipe();

    mpCamera = new Camera(videoEl, {
      onFrame: async () => { await hands.send({ image: videoEl }); },
      width: 640,
      height: 480,
    });
    await mpCamera.start();

    document.getElementById("startScreen").style.display = "none";
    el.status.textContent = "Tracking — show both hands to the webcam";
  } catch (e) {
    errBox.textContent =
      "Cannot start webcam: " + (e && e.message ? e.message : e) +
      " — grant camera permission, or serve over localhost (http) instead of file://.";
    el.status.textContent = "Webcam error";
  }
}

/* =========================================================================
   Bootstrap
   ========================================================================= */
initThree();
initPostProcessing();
medTimerEl = document.getElementById("medTimer");
medLabelEl = document.getElementById("medLabel");
medModeEl  = document.getElementById("medMode");
// Seed the camera-lookAt smoother so the hero pose lands cleanly on the first frame
_camLookCur.copy(HERO_LOOK_AT);
animate();

/* ─── App-state transitions ───────────────────────────────────────────────
   hero  — landing layout (huge logo, slogan, bow on the right)
   modes — breath-mode selection grid (after Begin →)
   sim   — webcam tracking + first-person archery view */
const startScreenEl = document.getElementById("startScreen");

function showHero() {
  startScreenEl.style.display = "block";
  startScreenEl.classList.remove("modes");
  startScreenEl.classList.add("hero");
}
function showModes() {
  startScreenEl.style.display = "block";
  startScreenEl.classList.remove("hero");
  startScreenEl.classList.add("modes");
}
function enterSim() {
  appState = "sim";
  document.body.classList.add("sim");
  startScreenEl.style.display = "none";
}

// Top-nav buttons
document.getElementById("navBegin").addEventListener("click", showModes);
document.querySelectorAll(".navItem").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".navItem").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.nav;
    if (target === "simulation") showModes();
    else showHero();
  });
});
document.getElementById("modeBack").addEventListener("click", showHero);

// Mode tile — selecting a breath mode starts the simulation
document.querySelectorAll(".modeTile").forEach((tile) => {
  tile.addEventListener("click", () => {
    const modeKey = tile.dataset.mode;
    currentBreathMode = BREATH_MODES[modeKey];
    if (!currentBreathMode) return;
    ensureAudio();
    breathStartMs = performance.now();
    lastPhaseIndex = -1;
    initMedHud(currentBreathMode.shape);
    medModeEl.textContent = currentBreathMode.name;
    enterSim();
    startCamera();
  });
});
